<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recent Responses - Medic Mouse</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .confidence-high { background-color: #10b981; }
        .confidence-medium { background-color: #f59e0b; }
        .confidence-low { background-color: #ef4444; }
        .thread-view {
            max-height: 400px;
            overflow-y: auto;
        }
        .message-bubble {
            border-radius: 12px;
            padding: 10px 15px;
            margin: 5px 0;
        }
        .user-message {
            background-color: #e5e7eb;
            margin-left: 20px;
        }
        .bot-message {
            background-color: #3b82f6;
            color: white;
            margin-right: 20px;
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-2xl font-bold text-blue-600">🐭 Medic Mouse</span>
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="/dashboard.html" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-200">Dashboard</a>
                        <a href="/recent-responses.html" class="px-3 py-2 rounded-md text-sm font-medium bg-blue-500 text-white">Recent Responses</a>
                        <a href="/knowledge-base.html" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-200">Knowledge Base</a>
                        <a href="/analytics.html" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-200">Analytics</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        <!-- Filters -->
        <div class="bg-white shadow rounded-lg p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">Filter Responses</h2>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <input type="text" id="searchQuery" placeholder="Search questions..." class="px-4 py-2 border rounded-lg">
                <select id="confidenceFilter" class="px-4 py-2 border rounded-lg">
                    <option value="">All Confidence</option>
                    <option value="high">High (80%+)</option>
                    <option value="medium">Medium (50-79%)</option>
                    <option value="low">Low (&lt;50%)</option>
                </select>
                <select id="dbStatusFilter" class="px-4 py-2 border rounded-lg">
                    <option value="">All Status</option>
                    <option value="added">Added to DB</option>
                    <option value="pending">Pending Review</option>
                    <option value="rejected">Not Added</option>
                </select>
                <select id="feedbackFilter" class="px-4 py-2 border rounded-lg">
                    <option value="">All Feedback</option>
                    <option value="correct">Marked Correct</option>
                    <option value="incorrect">Marked Incorrect</option>
                    <option value="none">No Feedback</option>
                </select>
                <button onclick="applyFilters()" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
                    <i class="fas fa-filter"></i> Apply
                </button>
            </div>
        </div>

        <!-- Responses Table -->
        <div class="bg-white shadow rounded-lg overflow-hidden">
            <table class="min-w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Time</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Question</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Confidence</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">DB Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Feedback</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody id="responsesTable" class="bg-white divide-y divide-gray-200">
                    <!-- Table rows will be populated by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Thread Modal -->
    <div id="threadModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden overflow-y-auto h-full w-full">
        <div class="relative top-20 mx-auto p-5 border w-11/12 md:w-3/4 shadow-lg rounded-md bg-white">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold" id="modalTitle">Thread Conversation</h3>
                <button onclick="closeThreadModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="threadContent" class="thread-view border rounded-lg p-4 bg-gray-50 mb-4">
                <!-- Thread messages will be populated here -->
            </div>
            <div class="flex justify-between items-center">
                <div class="flex space-x-2">
                    <button onclick="markCorrect()" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600">
                        <i class="fas fa-check"></i> Mark Correct
                    </button>
                    <button onclick="markIncorrect()" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">
                        <i class="fas fa-times"></i> Mark Incorrect
                    </button>
                    <button onclick="addToDatabase()" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
                        <i class="fas fa-database"></i> Add to DB
                    </button>
                </div>
                <a id="slackLink" href="#" target="_blank" class="text-blue-500 hover:text-blue-700">
                    <i class="fab fa-slack"></i> View in Slack
                </a>
            </div>
        </div>
    </div>

    <script>
        // Dummy data for demonstration
        const dummyResponses = [
            {
                id: 1,
                timestamp: '2026-04-02 18:45:23',
                question: 'What are the symptoms of diabetes?',
                answer: 'Common symptoms of diabetes include frequent urination, excessive thirst, unexplained weight loss, extreme fatigue, blurred vision, and slow-healing wounds.',
                confidence: 92,
                dbStatus: 'added',
                feedback: 'correct',
                slackLink: 'https://workspace.slack.com/archives/C123456/p1234567890',
                thread: [
                    { type: 'user', message: 'What are the symptoms of diabetes?', time: '18:45:23' },
                    { type: 'bot', message: 'Common symptoms of diabetes include frequent urination, excessive thirst, unexplained weight loss, extreme fatigue, blurred vision, and slow-healing wounds.', time: '18:45:25' },
                    { type: 'user', message: 'What about type 2 specifically?', time: '18:45:40' },
                    { type: 'bot', message: 'Type 2 diabetes symptoms are similar but may develop more gradually. Additional signs include darkened skin areas (acanthosis nigricans) and frequent infections.', time: '18:45:42' }
                ]
            },
            {
                id: 2,
                timestamp: '2026-04-02 17:32:15',
                question: 'How do I treat a minor burn?',
                answer: 'For minor burns: 1) Cool the burn under running water for 10-15 minutes, 2) Apply aloe vera gel, 3) Cover with sterile gauze, 4) Take OTC pain medication if needed.',
                confidence: 88,
                dbStatus: 'pending',
                feedback: 'none',
                slackLink: 'https://workspace.slack.com/archives/C123456/p1234567891',
                thread: [
                    { type: 'user', message: 'How do I treat a minor burn?', time: '17:32:15' },
                    { type: 'bot', message: 'For minor burns: 1) Cool the burn under running water for 10-15 minutes, 2) Apply aloe vera gel, 3) Cover with sterile gauze, 4) Take OTC pain medication if needed.', time: '17:32:17' }
                ]
            },
            {
                id: 3,
                timestamp: '2026-04-02 16:15:44',
                question: 'Is paracetamol safe during pregnancy?',
                answer: 'Paracetamol is generally considered safe during pregnancy when used as directed. However, always consult your healthcare provider before taking any medication.',
                confidence: 75,
                dbStatus: 'added',
                feedback: 'correct',
                slackLink: 'https://workspace.slack.com/archives/C123456/p1234567892',
                thread: [
                    { type: 'user', message: 'Is paracetamol safe during pregnancy?', time: '16:15:44' },
                    { type: 'bot', message: 'Paracetamol is generally considered safe during pregnancy when used as directed. However, always consult your healthcare provider before taking any medication.', time: '16:15:46' }
                ]
            },
            {
                id: 4,
                timestamp: '2026-04-02 15:23:11',
                question: 'What causes migraines?',
                answer: 'Migraines can be triggered by various factors including stress, hormonal changes, certain foods, sleep changes, and environmental factors.',
                confidence: 45,
                dbStatus: 'rejected',
                feedback: 'incorrect',
                slackLink: 'https://workspace.slack.com/archives/C123456/p1234567893',
                thread: [
                    { type: 'user', message: 'What causes migraines?', time: '15:23:11' },
                    { type: 'bot', message: 'Migraines can be triggered by various factors including stress, hormonal changes, certain foods, sleep changes, and environmental factors.', time: '15:23:13' },
                    { type: 'user', message: 'That seems very general, can you be more specific?', time: '15:23:30' },
                    { type: 'bot', message: 'I apologize for the general response. Let me consult more specific medical resources...', time: '15:23:32' }
                ]
            },
            {
                id: 5,
                timestamp: '2026-04-02 14:10:33',
                question: 'What is the normal blood pressure range?',
                answer: 'Normal blood pressure is typically below 120/80 mmHg. Elevated is 120-129/<80, Stage 1 hypertension is 130-139/80-89, Stage 2 is 140/90 or higher.',
                confidence: 95,
                dbStatus: 'added',
                feedback: 'correct',
                slackLink: 'https://workspace.slack.com/archives/C123456/p1234567894',
                thread: [
                    { type: 'user', message: 'What is the normal blood pressure range?', time: '14:10:33' },
                    { type: 'bot', message: 'Normal blood pressure is typically below 120/80 mmHg. Elevated is 120-129/<80, Stage 1 hypertension is 130-139/80-89, Stage 2 is 140/90 or higher.', time: '14:10:35' }
                ]
            }
        ];

        let currentResponseId = null;
        let filteredResponses = [...dummyResponses];

        function renderTable() {
            const tbody = document.getElementById('responsesTable');
            tbody.innerHTML = '';
            
            filteredResponses.forEach(response => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${response.timestamp}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${response.question.substring(0, 60)}...</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full text-white
                            ${response.confidence >= 80 ? 'confidence-high' : response.confidence >= 50 ? 'confidence-medium' : 'confidence-low'}">
                            ${response.confidence}%
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full
                            ${response.dbStatus === 'added' ? 'bg-green-100 text-green-800' : 
                              response.dbStatus === 'pending' ? 'bg-yellow-100 text-yellow-800' : 
                              'bg-red-100 text-red-800'}">
                            ${response.dbStatus}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        ${response.feedback === 'correct' ? '<i class="fas fa-check text-green-500"></i>' :
                          response.feedback === 'incorrect' ? '<i class="fas fa-times text-red-500"></i>' :
                          '<i class="fas fa-minus text-gray-400"></i>'}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button onclick="viewThread(${response.id})" class="text-blue-600 hover:text-blue-900 mr-3">
                            <i class="fas fa-comments"></i> View
                        </button>
                        <a href="${response.slackLink}" target="_blank" class="text-gray-600 hover:text-gray-900">
                            <i class="fab fa-slack"></i>
                        </a>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function viewThread(responseId) {
            const response = dummyResponses.find(r => r.id === responseId);
            currentResponseId = responseId;
            
            document.getElementById('modalTitle').textContent = `Thread: ${response.question}`;
            document.getElementById('slackLink').href = response.slackLink;
            
            const threadContent = document.getElementById('threadContent');
            threadContent.innerHTML = '';
            
            response.thread.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message-bubble ${msg.type === 'user' ? 'user-message' : 'bot-message'}`;
                messageDiv.innerHTML = `
                    <div class="font-semibold text-xs mb-1">${msg.type === 'user' ? 'User' : 'Medic Mouse'} - ${msg.time}</div>
                    <div>${msg.message}</div>
                `;
                threadContent.appendChild(messageDiv);
            });
            
            document.getElementById('threadModal').classList.remove('hidden');
        }

        function closeThreadModal() {
            document.getElementById('threadModal').classList.add('hidden');
            currentResponseId = null;
        }

        function markCorrect() {
            if (currentResponseId) {
                const response = dummyResponses.find(r => r.id === currentResponseId);
                response.feedback = 'correct';
                renderTable();
                alert('Response marked as correct!');
            }
        }

        function markIncorrect() {
            if (currentResponseId) {
                const response = dummyResponses.find(r => r.id === currentResponseId);
                response.feedback = 'incorrect';
                renderTable();
                alert('Response marked as incorrect! This will help improve future responses.');
            }
        }

        function addToDatabase() {
            if (currentResponseId) {
                const response = dummyResponses.find(r => r.id === currentResponseId);
                response.dbStatus = 'added';
                renderTable();
                alert('Response added to knowledge base!');
            }
        }

        function applyFilters() {
            const searchQuery = document.getElementById('searchQuery').value.toLowerCase();
            const confidenceFilter = document.getElementById('confidenceFilter').value;
            const dbStatusFilter = document.getElementById('dbStatusFilter').value;
            const feedbackFilter = document.getElementById('feedbackFilter').value;
            
            filteredResponses = dummyResponses.filter(response => {
                let match = true;
                
                if (searchQuery && !response.question.toLowerCase().includes(searchQuery)) {
                    match = false;
                }
                
                if (confidenceFilter) {
                    if (confidenceFilter === 'high' && response.confidence < 80) match = false;
                    if (confidenceFilter === 'medium' && (response.confidence < 50 || response.confidence >= 80)) match = false;
                    if (confidenceFilter === 'low' && response.confidence >= 50) match = false;
                }
                
                if (dbStatusFilter && response.dbStatus !== dbStatusFilter) {
                    match = false;
                }
                
                if (feedbackFilter && response.feedback !== feedbackFilter) {
                    match = false;
                }
                
                return match;
            });
            
            renderTable();
        }

        // Initialize table on load
        renderTable();
    </script>
</body>
</html>
